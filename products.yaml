# Product registry for the ucloud CLI monorepo.
#
# Each entry is a self-contained product module living under products/<dir>/.
# - hack/gen-products reads this file to generate cmd/products.gen.go
#   (registeredProducts() []cli.Product), which the platform wires into the
#   command tree.
# - hack/check-product enforces module boundaries and that this file stays
#   consistent with the products/ tree.
#
# Adding / enabling / disabling a product is a platform-serial change (touches
# this file + the generated registration), not a product-local change.
products:
  - name: udb
    dir: products/udb
    owners:
      - episkey
    commands:
      - mysql
    enabled: true

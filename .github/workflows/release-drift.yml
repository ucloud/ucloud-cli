# Release Drift Guard
#
# Detects the failure mode where master has releasable commits after the latest
# tag but no Release workflow produced the next patch version. This guard only
# alerts; release.yml remains the single writer of tags and GitHub Releases.

name: Release Drift Guard

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  release-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install svu
        run: go install github.com/caarlos0/svu@latest
        env:
          GOPROXY: https://goproxy.cn,direct

      - name: Detect unreleased master changes
        run: |
          set -euo pipefail

          SVU="$(go env GOPATH)/bin/svu"
          CURRENT="$("$SVU" current)"
          DETECT="$("$SVU" next)"
          LOG="$(git log --format='%B' "$CURRENT"..HEAD)"

          RELEASABLE=""
          if grep -qE '^(refactor|perf)(\([^)]+\))?!?:' <<<"$LOG"; then
            RELEASABLE="refactor/perf"
          fi

          if [ "$DETECT" != "$CURRENT" ] || [ -n "$RELEASABLE" ]; then
            echo "::error::master has releasable commits after $CURRENT, but no release tag covers HEAD. Run the Release workflow on master."
            echo "current=$CURRENT"
            echo "detected=$DETECT"
            git log --oneline "$CURRENT"..HEAD
            exit 1
          fi

          echo "Release is up to date at $CURRENT."

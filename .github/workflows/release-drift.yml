# Release Drift Guard
#
# Detects the failure mode where the weekly Release workflow misses its release
# window while master already had releasable commits waiting. This guard only
# alerts; release.yml remains the single writer of tags and GitHub Releases. It
# runs after the weekly release window, skips while Release is already
# queued/running, and gives fresh master commits a grace window so changes that
# land after the release window wait for the next week instead of failing drift.

name: Release Drift Guard

on:
  schedule:
    # Tuesdays 03:00 Asia/Shanghai (Monday 19:00 UTC), four hours after Release.
    - cron: "0 19 * * 1"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read

jobs:
  release-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install svu
        run: go install github.com/caarlos0/svu@latest
        env:
          GOPROXY: https://goproxy.cn,direct

      - name: Detect unreleased master changes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_GRACE_SECONDS: "14400"
        run: |
          set -euo pipefail

          running_releases=$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow Release \
              --branch master \
              --limit 20 \
              --json status \
              --jq '[.[] | select(.status=="queued" or .status=="in_progress" or .status=="waiting" or .status=="requested" or .status=="pending")] | length'
          )

          if [ "$running_releases" -gt 0 ]; then
            echo "Release workflow already queued/running on master; skipping drift check."
            exit 0
          fi

          head_ts=$(git log -1 --format=%ct HEAD)
          now_ts=$(date +%s)
          head_age=$((now_ts - head_ts))
          if [ "$head_age" -lt "$RELEASE_GRACE_SECONDS" ]; then
            echo "master HEAD is ${head_age}s old, within ${RELEASE_GRACE_SECONDS}s release grace window; skipping drift check."
            exit 0
          fi

          SVU="$(go env GOPATH)/bin/svu"
          CURRENT="$("$SVU" current)"
          DETECT="$("$SVU" next)"
          LOG="$(git log --format='%B' "$CURRENT"..HEAD)"

          RELEASABLE=""
          if grep -qE '^(refactor|perf)(\([^)]+\))?!?:' <<<"$LOG"; then
            RELEASABLE="refactor/perf"
          fi

          if [ "$DETECT" != "$CURRENT" ] || [ -n "$RELEASABLE" ]; then
            echo "::error::master has releasable commits after $CURRENT outside the weekly release grace window, but no release tag covers HEAD. Check the weekly Release workflow or run it manually."
            echo "current=$CURRENT"
            echo "detected=$DETECT"
            git log --oneline "$CURRENT"..HEAD
            exit 1
          fi

          echo "Release is up to date at $CURRENT."

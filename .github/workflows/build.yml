name: Build Go

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build
      env:
        GOPROXY: https://goproxy.cn,direct
      run: go build ./...


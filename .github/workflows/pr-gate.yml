# PR Admission Gate
#
# Required status checks (repo Settings → Branches → branch protection):
#   - owner-gate     (product-autonomous vs platform verdict; base-version owners)
#   - hold-gate      (red while a do-not-merge/hold label is present)
#   - scope-gate     (conventional commit title)
#   - check-product  (rule1–8 boundary checks)
#   - test           (build + vet + offline tests)
#   - build-matrix   (6 × platform)
#
# Plus repo Settings → General → "Allow auto-merge" ✓ (and "Allow squash merging"),
# and a branch-protection rule requiring ≥1 approval (the platform-PR human gate).
#
# Auto-merge: when owner-gate判定 a PR product-autonomous & eligible, the
# auto-merge job runs `gh pr merge --auto`. GitHub merges only once ALL required
# checks above are green and required approvals are met — so a red hold-gate
# (hold label) or a failing test keeps the PR un-merged (fail-closed).
#
# Merge-queue note: the `merge_group` trigger is kept so check-product/test/
# build-matrix can report inside a queue if one is enabled later (ROADMAP §5).

name: PR Gate

on:
  pull_request:
    # labeled/unlabeled are REQUIRED so hold-gate re-runs when do-not-merge/hold
    # is added/removed after checks went green — otherwise branch protection keeps
    # seeing the stale green hold-gate and the /hold brake silently fails.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  merge_group:

permissions:
  contents: read
  pull-requests: write

jobs:
  scope-gate:
    # Conventional commit title only. Product/platform/cross-product/owner
    # routing now lives in owner-gate (Go, base-version aware).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Conventional commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|refactor|build|ci|docs|test|chore|perf)(\([a-z0-9_-]+\))?!?: .+'; then
            echo "::error::PR title is not a conventional commit: $PR_TITLE"
            exit 1
          fi
          echo "scope-gate: conventional title OK"

  owner-gate:
    # Decides product-autonomous (auto-merge) vs platform (human approval) and
    # surfaces the reason to the PR. Green on a successful judgment — eligibility
    # is consumed by the auto-merge job; routing is not a failure.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      auto_merge: ${{ steps.gate.outputs.autoMergeEligible }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # need base+head for git diff / git show
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - name: Judge admission
        id: gate
        env:
          OWNER_GATE_AUTHOR: ${{ github.event.pull_request.user.login }}
          OWNER_GATE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GOPROXY: 'https://goproxy.cn,direct'
        run: |
          set -euo pipefail
          # Three-dot diff = the PR's own changes (diff from merge-base to head),
          # matching GitHub's "Files changed". A two-dot "$BASE $HEAD" diff would,
          # when the branch is behind master, also surface unrelated master-side
          # changes and wrongly downgrade a product-autonomous PR to platform.
          git diff --name-status "$OWNER_GATE_BASE_SHA...$HEAD_SHA" \
            | go run ./hack/owner-gate
      - name: Post verdict to PR (sticky comment)
        env:
          GH_TOKEN: ${{ github.token }}
          REASON: ${{ steps.gate.outputs.reason }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          MARKER='<!-- owner-gate-verdict -->'
          BODY="$MARKER"$'\n'"$REASON"
          ID=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" \
                 --jq "map(select(.body|startswith(\"$MARKER\")))|.[0].id // empty")
          if [ -n "$ID" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$ID" -f body="$BODY" >/dev/null
          else
            gh api -X POST "repos/$GITHUB_REPOSITORY/issues/$PR/comments" -f body="$BODY" >/dev/null
          fi
          echo "$REASON"

  hold-gate:
    # /hold emergency brake: red while the PR carries do-not-merge/hold, which
    # blocks auto-merge via branch protection without dropping approvals.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Fail if on hold
        if: contains(github.event.pull_request.labels.*.name, 'do-not-merge/hold')
        run: |
          echo "::error::PR is on hold (do-not-merge/hold label present) — remove the label to allow merge."
          exit 1
      - run: echo "hold-gate - not on hold"

  auto-merge:
    # Native GitHub auto-merge. Enabled only for product-autonomous eligible PRs;
    # GitHub enforces required checks + approval before the actual merge.
    if: github.event_name == 'pull_request' && needs.owner-gate.outputs.auto_merge == 'true'
    needs: [owner-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY"

  check-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: go run ./hack/check-product
        env: { GOPROXY: 'https://goproxy.cn,direct' }

  test:
    # NOTE: Only OFFLINE-safe packages. The `cmd` integration tests hit a live
    # UCloud API and are excluded; run `go test ./cmd/...` separately with creds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: go build ./...
        env: { GOPROXY: 'https://goproxy.cn,direct' }
      - run: go vet ./...
        env: { GOPROXY: 'https://goproxy.cn,direct' }
      - run: go test ./pkg/... ./base/ ./hack/... ./ux/... -count=1
        env: { GOPROXY: 'https://goproxy.cn,direct' }

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: go build -o /dev/null .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOPROXY: 'https://goproxy.cn,direct'

# Merge-to-release automation
#
# Flow:
#   1. A PR merges to master (or workflow_dispatch for the first guarded run).
#   2. Version policy: every release is a PATCH bump (0.3.3 → 0.3.4 → 0.3.5),
#      regardless of whether the commits are feat or fix — we intentionally do
#      NOT auto-minor on feat. svu is used in two roles here:
#        - `svu next`  → DETECTOR only: if it equals `svu current`, there are no
#                        releasable conventional commits since the last tag, so
#                        we skip. (next > current ⇒ something worth releasing.)
#        - `svu patch` → the actual version: always current + 0.0.1.
#   3. If there are releasable commits, the job tags HEAD with that patch version
#      and pushes the tag — all in the SAME job that runs goreleaser.
#      This avoids the "default GITHUB_TOKEN-pushed tag doesn't trigger a
#      downstream workflow" trap: tag + release happen in one atomic job.
#   4. goreleaser builds the binaries and creates the GitHub Release.
#   5. If there are no new feat/fix commits, the job exits early without
#      creating a release.
#
# First-launch guard:
#   The `environment: release` line below requires manual approval via
#   GitHub → Settings → Environments → release before any run proceeds.
#   Once the monorepo branch has landed on master and one release has been
#   verified, remove the `environment: release` line in a follow-up PR to
#   enable fully automatic releases.

name: Release

on:
  push:
    branches: [master]
  workflow_dispatch: {}   # manual trigger for the first guarded run

concurrency:
  group: release
  cancel-in-progress: false   # never cancel an in-flight release

jobs:
  release:
    runs-on: ubuntu-latest
    # FIRST-LAUNCH GUARD: requires manual approval via GitHub Environment.
    # Remove this line after the first verified release.
    environment: release
    permissions:
      contents: write   # push tags + create GitHub Releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # svu and goreleaser both need full tag history

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install svu
        run: go install github.com/caarlos0/svu@latest
        env:
          GOPROXY: https://goproxy.cn,direct

      - name: Compute next version & tag
        id: ver
        run: |
          SVU="$(go env GOPATH)/bin/svu"
          CURRENT="$("$SVU" current)"
          # DETECTOR: svu next > current iff there are releasable conventional
          # commits since the last tag. We never publish `svu next` itself —
          # the version policy is patch-only (see header).
          DETECT="$("$SVU" next)"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$DETECT" != "$CURRENT" ]; then
            NEXT="$("$SVU" patch)"   # force a patch bump regardless of feat/fix
            echo "next=$NEXT" >> "$GITHUB_OUTPUT"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$NEXT"
            git push origin "$NEXT"
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new releasable commits since $CURRENT — skipping release."
            echo "next=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: goreleaser/goreleaser-action@v6
        if: steps.ver.outputs.released == 'true'
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPROXY: https://goproxy.cn,direct
